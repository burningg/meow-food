worker_processes 1;

events {
        worker_connections 1024;
}


http {
        include mime.types;
        default_type application/octet-stream;
        sendfile on;
        keepalive_timeout 65;
        server {
                listen 80;
                server_name meow.youl.work;

                return 301 https://$host$request_uri;
        }

        server {
                listen 443 ssl;
                server_name meow.youl.work;


                location / {
                        alias /mnt/meow-food/ui/dist/   ;
                        index index.html;
                        try_files $uri $uri/ /index.html;
                        add_header 'Access-Control-Allow-Origin' '*';
                        add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, PUT, OPTIONS';
                        add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
                }

                ssl_certificate /home/meow-csr/meow.youl.work.pem;
                ssl_certificate_key /home/meow-csr/meow.youl.work.key;

                ssl_session_cache shared:SSL:1m;
                ssl_session_timeout 5m;

                ssl_ciphers HIGH:!aNULL:!MD5;
                ssl_prefer_server_ciphers on;
                ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        }

        server {
                listen 443 ssl;
                server_name meow-service.youl.work;

                location / {
                        root html;
                        index index.html index.htm;
                        proxy_pass http://localhost:8080;
                }

                ssl_certificate /home/meow-csr/meow-service.youl.work.pem;
                ssl_certificate_key /home/meow-csr/meow-service.youl.work.key;
                ssl_session_cache shared:SSL:1m;
                ssl_session_timeout 5m;

                ssl_ciphers HIGH:!aNULL:!MD5;
                ssl_prefer_server_ciphers on;
                ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        }

}
